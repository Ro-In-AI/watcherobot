<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音识别测试客户端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .status {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .status.disconnected {
            background: #fee;
            color: #c33;
        }

        .status.connected {
            background: #efe;
            color: #3c3;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #connectBtn {
            background: #4CAF50;
            color: white;
        }

        #connectBtn:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
        }

        #recordBtn {
            background: #ff5722;
            color: white;
        }

        #recordBtn:hover:not(:disabled) {
            background: #f44336;
            transform: translateY(-2px);
        }

        #recordBtn.recording {
            background: #f44336;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(244, 67, 54, 0); }
        }

        #stopBtn {
            background: #2196F3;
            color: white;
        }

        #stopBtn:hover:not(:disabled) {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        /* 消息展示区域 */
        .message-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .message-panel {
                grid-template-columns: 1fr;
            }
        }

        .message-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            min-height: 200px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .message-box h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding-bottom: 8px;
            border-bottom: 2px solid #dee2e6;
        }

        .message-box h3 .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            color: white;
        }

        .message-box h3 .badge.asr { background: #17a2b8; }
        .message-box h3 .badge.status { background: #ffc107; color: #333; }
        .message-box h3 .badge.log { background: #6f42c1; }
        .message-box h3 .badge.reply { background: #28a745; }
        .message-box h3 .badge.error { background: #dc3545; }

        .message-content {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .message-item {
            padding: 8px 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            background: white;
            border-left: 3px solid #ddd;
        }

        .message-item.asr { border-left-color: #17a2b8; }
        .message-item.status { border-left-color: #ffc107; }
        .message-item.log { border-left-color: #6f42c1; }
        .message-item.reply { border-left-color: #28a745; }
        .message-item.error { border-left-color: #dc3545; }

        .message-item .time {
            font-size: 10px;
            color: #999;
            margin-bottom: 4px;
        }

        .message-item .text {
            color: #333;
            word-break: break-all;
        }

        .message-item.log .text {
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            color: #6f42c1;
        }

        .message-item.status .text {
            color: #856404;
        }

        .message-item.error .text {
            color: #dc3545;
        }

        .message-item.reply .text {
            color: #155724;
        }

        /* 舵机动画区域 */
        .servo-section {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .servo-section h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .servo-section h3::before { content: "🤖"; }

        .servo-states {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .servo-btn {
            padding: 8px 14px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .servo-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .servo-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .servo-btn.tts-active::after {
            content: " TTS";
            font-size: 10px;
            background: #ff9800;
            padding: 1px 5px;
            border-radius: 8px;
            margin-left: 4px;
        }

        .servo-actions {
            display: flex;
            gap: 10px;
        }

        .servo-actions button {
            padding: 10px 16px;
            font-size: 13px;
        }

        .tts-btn { background: #ff9800; color: white; }
        .play-btn { background: #4CAF50; color: white; }
        .play-btn.playing { background: #f44336; }

        .current-tts {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .current-tts strong { color: #e65100; }

        /* 音频播放状态 */
        .audio-status {
            margin-top: 15px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 8px;
            font-size: 12px;
            color: #1565c0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .audio-status.playing {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .audio-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
        }

        .audio-status.playing .audio-dot {
            background: #4CAF50;
            animation: dot-pulse 1s infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 语音识别测试</h1>

        <div id="status" class="status disconnected">未连接</div>

        <div class="controls">
            <button id="connectBtn">连接服务器</button>
            <button id="recordBtn" disabled>开始录音</button>
            <button id="stopBtn" disabled>发送完成</button>
        </div>

        <div class="message-panel">
            <!-- ASR 识别结果 -->
            <div class="message-box">
                <h3><span class="badge asr">ASR</span> 语音识别</h3>
                <div id="asrContent" class="message-content"></div>
            </div>

            <!-- 状态消息 -->
            <div class="message-box">
                <h3><span class="badge status">状态</span> 执行状态</h3>
                <div id="statusContent" class="message-content"></div>
            </div>

            <!-- OpenClaw 日志 -->
            <div class="message-box">
                <h3><span class="badge log">日志</span> AI 实时日志</h3>
                <div id="logContent" class="message-content"></div>
            </div>

            <!-- Bot 回复 -->
            <div class="message-box">
                <h3><span class="badge reply">AI</span> AI 回复</h3>
                <div id="replyContent" class="message-content"></div>
            </div>
        </div>

        <!-- 音频播放状态 -->
        <div id="audioStatus" class="audio-status">
            <span class="audio-dot"></span>
            <span id="audioText">等待音频...</span>
        </div>

        <!-- 舵机动画控制 -->
        <div class="servo-section" id="servoSection" style="display: none;">
            <h3>舵机动画控制</h3>
            <div class="servo-states" id="servoStates"></div>
            <div class="servo-actions">
                <button id="setTtsBtn" class="tts-btn" disabled>设为TTS动画</button>
                <button id="playBtn" class="play-btn" disabled>播放动画</button>
            </div>
            <div class="current-tts">当前TTS动画: <strong id="currentTtsText">watcher_animation</strong></div>
        </div>
    </div>

    <script>
        const WS_URL = 'ws://localhost:8765';
        const SAMPLE_RATE = 16000;
        const TTS_SAMPLE_RATE = 24000;

        // DOM 元素
        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const asrContent = document.getElementById('asrContent');
        const statusContent = document.getElementById('statusContent');
        const logContent = document.getElementById('logContent');
        const replyContent = document.getElementById('replyContent');
        const audioStatus = document.getElementById('audioStatus');
        const audioText = document.getElementById('audioText');

        let ws = null;
        let mediaRecorder = null;
        let audioContext = null;
        let processor = null;
        let audioStream = null;
        let isRecording = false;

        // 音频队列播放
        let audioQueue = [];
        let isPlaying = false;

        // 舵机状态
        let availableServoStates = [];
        let currentTtsState = 'watcher_animation';
        let selectedServoState = null;
        let playingServoState = null;

        // 添加消息到面板
        function addMessage(container, type, text) {
            const item = document.createElement('div');
            item.className = `message-item ${type}`;

            const time = new Date().toLocaleTimeString();
            item.innerHTML = `
                <div class="time">${time}</div>
                <div class="text">${escapeHtml(text)}</div>
            `;

            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 连接 WebSocket
        connectBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
                return;
            }

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                statusDiv.textContent = '已连接';
                statusDiv.className = 'status connected';
                connectBtn.textContent = '断开连接';
                recordBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                // 处理二进制音频数据
                if (event.data instanceof Blob || event.data instanceof ArrayBuffer) {
                    handleTTSAudio(event.data);
                } else if (typeof event.data === 'string') {
                    handleTextMessage(event.data);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket错误:', error);
            };

            ws.onclose = () => {
                statusDiv.textContent = '未连接';
                statusDiv.className = 'status disconnected';
                connectBtn.textContent = '连接服务器';
                recordBtn.disabled = true;
                stopBtn.disabled = true;
                ws = null;
                availableServoStates = [];
                document.getElementById('servoSection').style.display = 'none';
            };
        });

        // 处理文本消息
        function handleTextMessage(data) {
            // 尝试解析 JSON
            let jsonData = null;
            try {
                jsonData = JSON.parse(data);
            } catch (e) {
                // 非 JSON 格式，忽略
                return;
            }

            const msgType = jsonData.type;
            const msgData = jsonData.data;

            switch (msgType) {
                case 'asr_result':
                    addMessage(asrContent, 'asr', msgData);
                    break;

                case 'status':
                    addMessage(statusContent, 'status', msgData);
                    break;

                case 'openclaw_log':
                    // 日志消息包含 content 和 status
                    const logText = msgData.content || msgData;
                    const logStatus = msgData.status || '';
                    addMessage(logContent, 'log', `[${logStatus}] ${logText}`);
                    break;

                case 'bot_reply':
                    addMessage(replyContent, 'reply', msgData);
                    break;

                case 'error':
                    addMessage(statusContent, 'error', msgData);
                    break;

                case 'servo_states':
                    if (msgData && msgData.states) {
                        availableServoStates = msgData.states;
                        renderServoButtons();
                        document.getElementById('servoSection').style.display = 'block';
                    }
                    break;

                case 'servo':
                    // 舵机数据，忽略（前端不需要显示）
                    break;

                case 'tts_end':
                    // TTS 结束
                    break;
            }
        }

        // 处理 TTS 音频 - 加入队列顺序播放
        function handleTTSAudio(audioData) {
            // 将音频数据加入队列
            audioQueue.push(audioData);
            updateAudioStatus();

            // 如果没有在播放，开始播放
            if (!isPlaying) {
                playNextAudio();
            }
        }

        // 播放队列中的下一个音频
        async function playNextAudio() {
            if (audioQueue.length === 0) {
                isPlaying = false;
                updateAudioStatus();
                return;
            }

            isPlaying = true;
            updateAudioStatus();

            const audioData = audioQueue.shift();

            try {
                let arrayBuffer;
                if (audioData instanceof Blob) {
                    arrayBuffer = await audioData.arrayBuffer();
                } else {
                    arrayBuffer = audioData;
                }

                // 使用 AudioContext 播放
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }

                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const pcmData = new Int16Array(arrayBuffer);
                const length = pcmData.length;

                const audioBuffer = audioContext.createBuffer(1, length, TTS_SAMPLE_RATE);
                const channelData = audioBuffer.getChannelData(0);

                for (let i = 0; i < length; i++) {
                    channelData[i] = pcmData[i] / 32768.0;
                }

                // 播放
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);

                source.onended = () => {
                    // 播放完成，继续播放下一个
                    playNextAudio();
                };

                source.start(0);

            } catch (error) {
                console.error('音频播放失败:', error);
                // 继续尝试播放下一个
                playNextAudio();
            }
        }

        // 更新音频状态显示
        function updateAudioStatus() {
            if (isPlaying) {
                audioStatus.className = 'audio-status playing';
                audioText.textContent = `播放中... (队列: ${audioQueue.length + 1})`;
            } else if (audioQueue.length > 0) {
                audioStatus.className = 'audio-status';
                audioText.textContent = `等待播放... (队列: ${audioQueue.length})`;
            } else {
                audioStatus.className = 'audio-status';
                audioText.textContent = '等待音频...';
            }
        }

        // 渲染舵机按钮
        function renderServoButtons() {
            const container = document.getElementById('servoStates');
            container.innerHTML = '';

            availableServoStates.forEach(state => {
                const btn = document.createElement('button');
                btn.className = 'servo-btn';
                btn.textContent = state;

                if (state === selectedServoState) btn.classList.add('active');
                if (state === currentTtsState) btn.classList.add('tts-active');

                btn.addEventListener('click', () => {
                    selectedServoState = state;
                    renderServoButtons();
                    document.getElementById('setTtsBtn').disabled = !selectedServoState;
                    document.getElementById('playBtn').disabled = !selectedServoState;
                });

                container.appendChild(btn);
            });
        }

        // 录音控制
        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        });

        stopBtn.addEventListener('click', () => {
            // 先停止录音，防止继续发送音频
            stopRecording();

            // 立即发送 over 消息
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('over');
            }

            stopBtn.disabled = true;
        });

        async function startRecording() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
                const source = audioContext.createMediaStreamSource(audioStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    // 检查 isRecording 标志和 processor 是否存在
                    if (!isRecording || !processor || !ws || ws.readyState !== WebSocket.OPEN) {
                        return;
                    }
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = float32ToPCM16(inputData);
                    ws.send(pcmData);
                };

                isRecording = true;
                recordBtn.textContent = '录音中...';
                recordBtn.classList.add('recording');
                stopBtn.disabled = false;

                // 清空之前的消息
                asrContent.innerHTML = '';
                statusContent.innerHTML = '';
                logContent.innerHTML = '';
                replyContent.innerHTML = '';
                audioQueue = [];

            } catch (error) {
                console.error('录音失败:', error);
                alert('无法访问麦克风: ' + error.message);
            }
        }

        function stopRecording() {
            if (!isRecording) return;

            isRecording = false;
            recordBtn.textContent = '开始录音';
            recordBtn.classList.remove('recording');

            // 断开 ScriptProcessor 连接，防止继续发送音频
            if (processor) {
                processor.disconnect();
                processor = null;
            }

            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
            }

            // 关闭 AudioContext
            if (audioContext) {
                audioContext.close().then(() => {
                    audioContext = null;
                });
            }
        }

        function float32ToPCM16(float32Array) {
            const buffer = new ArrayBuffer(float32Array.length * 2);
            const view = new DataView(buffer);

            for (let i = 0; i < float32Array.length; i++) {
                let s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            return buffer;
        }

        // 舵机按钮事件
        document.getElementById('setTtsBtn').addEventListener('click', () => {
            if (!selectedServoState || !ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({ type: 'servo', action: 'set_tts_servo', state: selectedServoState }));
            currentTtsState = selectedServoState;
            document.getElementById('currentTtsText').textContent = selectedServoState;
            renderServoButtons();
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!selectedServoState || !ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({ type: 'servo', action: 'start', state: selectedServoState, play_once: true, broadcast: true }));
        });
    </script>
</body>
</html>
